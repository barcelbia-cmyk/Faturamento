<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Faturamento">
<link rel="manifest" id="manifest-link">
<title>Faturamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F5F3;--white:#FFFFFF;--surface:#FAFAF9;--border:#E8E8E5;--border2:#D4D4D0;
  --text:#1A1A18;--text2:#6B6B67;--text3:#ABABAB;
  --green:#18794E;--green-bg:#EDFAF3;--green-border:#A7E3C7;
  --red:#C0392B;--red-bg:#FEF2F2;--red-border:#FECACA;
  --blue:#2563EB;--amber:#92400E;--amber-bg:#FFFBEB;
  --r:12px;--r-sm:8px;--nav-h:64px;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column;}
.auth-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:2rem;}
.auth-screen.hidden{display:none;}
.auth-box{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:360px;}
.auth-logo{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;}
.auth-logo-mark{width:28px;height:28px;background:var(--text);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.auth-logo-mark svg{width:14px;height:14px;fill:white;}
.auth-logo-name{font-size:16px;font-weight:600;}
.auth-title{font-size:18px;font-weight:600;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem;}
.auth-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.auth-lbl{font-size:12px;font-weight:500;color:var(--text2);}
.auth-inp{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);font-family:'Inter',sans-serif;width:100%;-webkit-appearance:none;}
.auth-inp:focus{outline:none;border-color:var(--blue);}
.auth-btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-top:4px;}
.auth-btn.primary{background:var(--text);color:white;margin-bottom:8px;}
.auth-btn.secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border);}
.auth-err{font-size:12px;color:var(--red);margin-bottom:8px;display:none;}
.auth-err.show{display:block;}
.auth-switch{font-size:12px;color:var(--text3);text-align:center;margin-top:12px;}
.auth-switch span{color:var(--blue);cursor:pointer;font-weight:500;}
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading-screen.hidden{display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--text3);}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 1rem;padding-top:var(--safe-t);height:calc(52px + var(--safe-t));display:flex;align-items:flex-end;padding-bottom:10px;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-mark{width:22px;height:22px;background:var(--text);border-radius:5px;display:flex;align-items:center;justify-content:center;}
.brand-mark svg{width:11px;height:11px;fill:white;}
.brand-name{font-size:14px;font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.month-nav{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px;}
.month-nav button{background:transparent;border:none;width:32px;height:28px;border-radius:6px;cursor:pointer;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.month-nav button:active{background:var(--border);}
.month-label{font-size:13px;font-weight:500;color:var(--text);padding:0 8px;white-space:nowrap;}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;}
.alert-banner{background:var(--red-bg);border-bottom:1px solid var(--red-border);padding:8px 1rem;display:none;align-items:center;gap:8px;flex-shrink:0;}
.alert-banner.show{display:flex;}
.alert-text{font-size:12px;font-weight:500;color:var(--red);flex:1;}
.alert-close{background:transparent;border:none;font-size:16px;color:var(--red);cursor:pointer;}
.day-reminder{background:var(--amber-bg);border-bottom:1px solid #FDE68A;padding:10px 1rem;display:none;align-items:center;gap:10px;flex-shrink:0;}
.day-reminder.show{display:flex;}
.day-reminder-text{font-size:12px;font-weight:500;color:var(--amber);flex:1;}
.day-reminder-btn{background:var(--amber);color:white;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}
.day-reminder-close{background:transparent;border:none;font-size:16px;color:var(--amber);cursor:pointer;}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 80px);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);display:flex;z-index:200;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;-webkit-tap-highlight-color:transparent;padding:8px 0;}
.nav-icon{font-size:20px;line-height:1;}
.nav-label{font-size:10px;font-weight:500;color:var(--text3);}
.nav-item.active .nav-label{color:var(--blue);}
.fab-wrap{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);right:20px;z-index:199;display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
.fab{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;box-shadow:0 4px 16px rgba(0,0,0,.18);}
.fab-main{background:var(--text);transition:transform .2s;}
.fab-main:active{transform:scale(.93);}
.fab-main svg{width:24px;height:24px;fill:none;stroke:white;stroke-width:2.5;stroke-linecap:round;transition:transform .25s;}
.fab-main.open svg{transform:rotate(45deg);}
.fab-mini-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:8px;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .2s;}
.fab-mini-wrap.open{opacity:1;pointer-events:all;transform:translateY(0);}
.fab-mini-row{display:flex;align-items:center;gap:10px;}
.fab-mini-label{background:var(--text);color:white;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;padding:5px 12px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.fab-mini{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.15);-webkit-tap-highlight-color:transparent;}
.fab-mini:active{transform:scale(.9);}
.fab-mini-rec{background:var(--green-bg);border:2px solid var(--green);}
.fab-mini-rec svg{fill:none;stroke:var(--green);stroke-width:2.5;stroke-linecap:round;}
.fab-mini-desp{background:var(--red-bg);border:2px solid var(--red);}
.fab-mini-desp svg{fill:none;stroke:var(--red);stroke-width:2.5;stroke-linecap:round;}
.fab-backdrop{position:fixed;inset:0;z-index:198;display:none;}
.fab-backdrop.open{display:block;}
.container{max-width:600px;margin:0 auto;padding:1rem;}
.screen{display:none;}
.screen.active{display:block;}
.metrics-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.metrics-4{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.metric{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.metric.green-card{background:var(--green-bg);border-color:var(--green-border);}
.metric.red-card{background:var(--red-bg);border-color:var(--red-border);}
.mlabel{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.mval{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.03em;line-height:1.1;margin-bottom:2px;}
.mval.green{color:var(--green);}
.mval.red{color:var(--red);}
.mval.sm{font-size:15px;}
.msub{font-size:11px;color:var(--text3);}
.msub.green{color:var(--green);}
.msub.red{color:var(--red);}
.mbar{height:3px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:8px;}
.mfill{height:100%;border-radius:2px;transition:width .5s ease;}
.mcompare{font-size:10px;margin-top:4px;}
.arr-up{color:var(--green);}
.arr-down{color:var(--red);}
.meta-acum-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.mac-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.mac-label2{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.mac-val2{font-size:18px;font-weight:600;letter-spacing:-.03em;}
.mac-pct2{font-size:20px;font-weight:700;letter-spacing:-.03em;}
.section-head{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px;}
.section-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.section-action{font-size:12px;font-weight:500;color:var(--blue);background:transparent;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cat-pct-strip{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.cat-pct-bar{display:flex;height:8px;}
.cat-pct-seg{height:100%;}
.cat-pct-legend{display:flex;flex-wrap:wrap;gap:6px 10px;padding:10px 12px;}
.cat-pct-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.cat-pct-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.metas-scroll{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:4px;}
.metas-scroll::-webkit-scrollbar{display:none;}
.meta-area-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;min-width:130px;flex-shrink:0;}
.mac-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.cdot{display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.mac-val{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.02em;margin-bottom:2px;}
.mac-pct{font-size:11px;font-weight:500;margin-bottom:5px;}
.mac-bar{height:2px;background:var(--bg);border-radius:2px;overflow:hidden;}
.mac-fill{height:100%;border-radius:2px;}
.mac-meta{font-size:10px;color:var(--text3);margin-top:4px;}
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.empty-state{padding:20px;text-align:center;font-size:12px;color:var(--text3);}
.entry{padding:10px 14px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);}
.entry:last-child{border-bottom:none;}
.entry-left{display:flex;flex-direction:column;align-items:flex-start;min-width:32px;}
.entry-date{font-size:11px;font-weight:500;color:var(--text2);}
.entry-fixed-badge{font-size:9px;font-weight:600;color:var(--amber);background:var(--amber-bg);border-radius:3px;padding:1px 4px;margin-top:2px;}
.entry-info{flex:1;min-width:0;}
.entry-cats{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:2px;}
.cat-pill{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;background:var(--bg);color:var(--text2);border:1px solid var(--border);white-space:nowrap;}
.entry-cat-name{font-size:12px;color:var(--text2);}
.entry-note{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.entry-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.entry-val{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;}
.entry-val.neg{color:var(--red);}
.del-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:18px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.del-btn:active{background:var(--red-bg);color:var(--red);}
.breakdown-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);}
.breakdown-row:last-child{border-bottom:none;}
.bk-label{font-size:12px;color:var(--text2);flex:1;}
.bk-bar-wrap{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
.bk-bar-fill{height:100%;border-radius:2px;}
.bk-val{font-size:12px;font-weight:500;color:var(--text);text-align:right;min-width:70px;}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:var(--amber-bg);border:1px solid #FDE68A;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--amber);margin:10px 14px 4px;}
.days-grid{display:flex;flex-wrap:wrap;gap:4px;padding:10px 14px 14px;}
.day-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--text3);background:var(--bg);border:1px solid var(--border);}
.day-dot.has{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
.day-dot.today{border-color:var(--blue);color:var(--blue);}
.day-dot.future{opacity:.3;}
.insight-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);}
.insight-row:last-child{border-bottom:none;}
.ir-label{font-size:12px;color:var(--text2);}
.ir-val{font-size:12px;font-weight:600;}
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.chart-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:none;align-items:flex-end;}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(var(--safe-b) + 1rem);}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px;}
.sheet-title{font-size:16px;font-weight:600;color:var(--text);padding:0 1rem 14px;border-bottom:1px solid var(--border);}
.sheet-body{padding:1rem;}
.sheet-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.sheet-lbl{font-size:12px;font-weight:500;color:var(--text2);}
.sheet-inp{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);font-family:'Inter',sans-serif;width:100%;-webkit-appearance:none;}
.sheet-inp:focus{outline:none;border-color:var(--blue);}
.sheet-inp.sm{font-size:14px;padding:10px 12px;}
.sheet-sel{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);font-family:'Inter',sans-serif;width:100%;-webkit-appearance:none;cursor:pointer;}
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.cat-field{display:flex;flex-direction:column;gap:5px;}
.cat-field-lbl{font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:4px;}
.cat-inp{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;font-size:16px;color:var(--text);font-family:'Inter',sans-serif;text-align:right;width:100%;-webkit-appearance:none;}
.cat-inp:focus{outline:none;border-color:var(--blue);}
.sheet-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-bottom:8px;-webkit-tap-highlight-color:transparent;}
.sheet-btn.primary{background:var(--text);color:white;}
.sheet-btn.secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:12px;}
.toggle-info .tl{font-size:14px;font-weight:500;color:var(--text);}
.toggle-info .ts{font-size:12px;color:var(--text3);margin-top:2px;}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--border2);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:white;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{transform:translateX(20px);}
.meta-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.settings-section{margin-bottom:16px;}
.settings-section-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.settings-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.settings-lbl{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;}
.settings-desc{font-size:12px;color:var(--text3);margin-bottom:10px;}
.settings-row{display:flex;align-items:center;gap:10px;}
.settings-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;-webkit-appearance:none;}
.settings-inp:focus{outline:none;border-color:var(--blue);}
.settings-save{background:var(--text);color:white;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}
.area-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.area-item{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;}
.area-name{flex:1;font-size:13px;font-weight:500;color:var(--text);}
.area-del{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px 4px;}
.area-add-row{display:flex;gap:8px;}
.area-add-inp{flex:1;background:var(--white);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'Inter',sans-serif;}
.area-add-inp:focus{outline:none;border-color:var(--blue);}
.area-add-btn{background:var(--text);color:white;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}
.color-pick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.color-opt{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.color-opt.sel{border-color:var(--text);}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:360px;}
thead th{background:var(--surface);color:var(--text3);font-weight:500;font-size:10px;padding:8px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{text-align:left;}
tbody tr:nth-child(even){background:var(--surface);}
tbody td{padding:8px 10px;text-align:right;color:var(--text);font-size:12px;border-bottom:1px solid var(--border);}
tbody td:first-child{text-align:left;color:var(--text2);font-weight:500;}
tfoot td{padding:8px 10px;text-align:right;font-weight:600;background:var(--surface);border-top:1px solid var(--border2);font-size:12px;}
tfoot td:first-child{text-align:left;color:var(--text2);}

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>
<script>
const SUPABASE_URL='https://iaijpiwxsgzxaljwbzbd.supabase.co';
const SUPABASE_KEY='sb_publishable_ylACeL6M1srUdSNDqmFlTQ_vzsjvqJu';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const MONTHS_PT=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS_SHORT=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const DAYS_WEEK=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
const COLOR_PALETTE=['#2563EB','#059669','#D97706','#DB2777','#7C3AED','#EA580C','#0891B2','#65A30D','#DC2626','#9333EA'];
const DEFAULT_AREAS=[{id:'vendas',name:'Vendas',color:'#2563EB'},{id:'publicidade',name:'Publicidade',color:'#059669'},{id:'campeonatos',name:'Campeonatos',color:'#D97706'},{id:'face',name:'Face/monet.',color:'#DB2777'},{id:'prestacao',name:'Prestacao',color:'#7C3AED'},{id:'shopee',name:'Shopee',color:'#EA580C'}];
const DEFAULT_DESP_CATS=['Alimentacao','Aluguel','Anuncios','Frete','Combustivel','Outros'];
let curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
let currentUser=null;
let userConfig={areas:DEFAULT_AREAS,desp_cats:DEFAULT_DESP_CATS,alert_pct:50,fixed_desps:[]};
let cache={recs:{},desps:{},metas:{}};
let alertDismissed=false,reminderDismissed=false,selectedColor=COLOR_PALETTE[0],fabOpen=false;
let compInsts={};
const fmtBRL=n=>'R$ '+Math.round(n).toLocaleString('pt-BR');
const fmtK=n=>{n=Math.round(n);if(n>=1000000)return 'R$'+(n/1000000).toFixed(1).replace('.',',')+' M';if(n>=1000)return 'R$'+(n/1000).toFixed(1).replace('.',',')+' k';return 'R$ '+n.toLocaleString('pt-BR');};
const fmtDate=d=>{const[y,m,day]=d.split('-');return day+'/'+m;};
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const yesterdayStr=()=>{const d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
const mkKey=(y,m)=>y+'_'+m;
function showSaving(){const el=document.getElementById('savingIndicator');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');err.classList.remove('show');
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent='Email ou senha incorretos.';err.classList.add('show');}
}
async function doRegister(){
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPass').value;
  const err=document.getElementById('registerErr');err.classList.remove('show');
  const{error}=await sb.auth.signUp({email,password:pass});
  if(error){err.textContent=error.message;err.classList.add('show');}
  else{err.style.color='var(--green)';err.textContent='Conta criada! Verifique seu email para confirmar.';err.classList.add('show');}
}
async function doLogout(){await sb.auth.signOut();currentUser=null;cache={recs:{},desps:{},metas:{}};document.getElementById('appShell').style.display='none';document.getElementById('authScreen').classList.remove('hidden');}
function showLogin(){document.getElementById('loginForm').style.display='';document.getElementById('registerForm').style.display='none';}
function showRegister(){document.getElementById('loginForm').style.display='none';document.getElementById('registerForm').style.display='';}
async function loadConfig(){
  const{data}=await sb.from('configuracoes').select('*').eq('user_id',currentUser.id).single();
  if(data){userConfig.areas=data.areas&&data.areas.length?data.areas:DEFAULT_AREAS;userConfig.desp_cats=data.desp_cats&&data.desp_cats.length?data.desp_cats:DEFAULT_DESP_CATS;userConfig.alert_pct=data.alert_pct||50;userConfig.fixed_desps=data.fixed_desps||[];}
  else await sb.from('configuracoes').insert({user_id:currentUser.id,areas:DEFAULT_AREAS,desp_cats:DEFAULT_DESP_CATS,alert_pct:50,fixed_desps:[]});
}
async function saveConfig(){showSaving();await sb.from('configuracoes').upsert({user_id:currentUser.id,...userConfig},{onConflict:'user_id'});}
async function loadRecs(y,m){
  const k=mkKey(y,m);if(cache.recs[k])return cache.recs[k];
  const start=y+'-'+String(m+1).padStart(2,'0')+'-01';
  const end=y+'-'+String(m+1).padStart(2,'0')+'-'+String(daysInMonth(y,m)).padStart(2,'0');
  const{data}=await sb.from('receitas').select('*').eq('user_id',currentUser.id).gte('data',start).lte('data',end).order('data',{ascending:false});
  cache.recs[k]=data||[];return cache.recs[k];
}
async function loadDesps(y,m){
  const k=mkKey(y,m);if(cache.desps[k])return cache.desps[k];
  const start=y+'-'+String(m+1).padStart(2,'0')+'-01';
  const end=y+'-'+String(m+1).padStart(2,'0')+'-'+String(daysInMonth(y,m)).padStart(2,'0');
  const{data}=await sb.from('despesas').select('*').eq('user_id',currentUser.id).gte('data',start).lte('data',end).order('data',{ascending:false});
  cache.desps[k]=data||[];return cache.desps[k];
}
async function loadMetas(y,m){
  const k=mkKey(y,m);if(cache.metas[k])return cache.metas[k];
  const{data}=await sb.from('metas').select('*').eq('user_id',currentUser.id).eq('ano',y).eq('mes',m).single();
  cache.metas[k]=data?data.valores:{Total:0,Anual:0};return cache.metas[k];
}
async function injectFixedDesps(y,m){
  if(!userConfig.fixed_desps.length)return;
  const desps=await loadDesps(y,m);
  for(const f of userConfig.fixed_desps){
    if(!desps.some(d=>d.fixed_id===f.id)){
      const date=y+'-'+String(m+1).padStart(2,'0')+'-01';
      const{data}=await sb.from('despesas').insert({user_id:currentUser.id,data:date,val:f.val,categoria:f.cat,note:f.note||'',is_fixed:true,fixed_id:f.id}).select().single();
      if(data){desps.push(data);desps.sort((a,b)=>b.data.localeCompare(a.data));}
    }
  }
}
const getAreaTotal=(recs,areaId)=>recs.reduce((s,r)=>s+((r.vals||{})[areaId]||0),0);
const getRecTotal=recs=>userConfig.areas.reduce((s,ar)=>s+getAreaTotal(recs,ar.id),0);
const getDespTotal=desps=>desps.reduce((s,d)=>s+(d.val||0),0);
function updateMonthLabel(){document.getElementById('monthLabel').textContent=MONTHS_SHORT[curMonth]+' '+curYear;}
async function changeMonth(delta){
  curMonth+=delta;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}
  alertDismissed=false;updateMonthLabel();await injectFixedDesps(curYear,curMonth);await renderDashboard();
}
function toggleFab(){fabOpen=!fabOpen;document.getElementById('fabMain').classList.toggle('open',fabOpen);document.getElementById('fabMini').classList.toggle('open',fabOpen);document.getElementById('fabBackdrop').classList.toggle('open',fabOpen);}
function closeFab(){fabOpen=false;document.getElementById('fabMain').classList.remove('open');document.getElementById('fabMini').classList.remove('open');document.getElementById('fabBackdrop').classList.remove('open');}
function switchScreen(name,btn){
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('fabWrap').style.display=name==='dash'?'flex':'none';closeFab();
  if(name==='comp')renderComparativo();if(name==='annual')renderAnnualTable();
  if(name==='config'){renderAreaConfig();document.getElementById('alertPctInput').value=userConfig.alert_pct;}
}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function openSheetRec(){document.getElementById('rec-date').value=yesterdayStr();document.getElementById('rec-note').value='';buildCatsGrid();document.getElementById('sheetRec').classList.add('open');}
function openSheetDesp(){document.getElementById('desp-date').value=todayStr();document.getElementById('desp-val').value='';document.getElementById('desp-note').value='';document.getElementById('despFixaToggle').classList.remove('on');buildDespCatSel();document.getElementById('sheetDesp').classList.add('open');}
async function openMetaSheet(){
  const metas=await loadMetas(curYear,curMonth);
  document.getElementById('metaSheetTitle').textContent='Metas - '+MONTHS_PT[curMonth]+' '+curYear;
  document.getElementById('meta-total').value=metas.Total||'';document.getElementById('meta-anual').value=metas.Anual||'';
  document.getElementById('metaEditGrid').innerHTML=userConfig.areas.map((ar,i)=>'<div class="cat-field"><span class="cat-field-lbl"><span class="cdot" style="background:'+ar.color+'"></span>'+ar.name+'</span><input class="cat-inp" type="number" min="0" step="100" id="metainp_'+i+'" value="'+(metas[ar.id]||'')+'" placeholder="0" inputmode="numeric"></div>').join('');
  document.getElementById('sheetMeta').classList.add('open');
}
async function saveMetas(){
  const valores={Total:parseFloat(document.getElementById('meta-total').value)||0,Anual:parseFloat(document.getElementById('meta-anual').value)||0};
  userConfig.areas.forEach((ar,i)=>{valores[ar.id]=parseFloat(document.getElementById('metainp_'+i).value)||0;});
  showSaving();await sb.from('metas').upsert({user_id:currentUser.id,ano:curYear,mes:curMonth,valores},{onConflict:'user_id,ano,mes'});
  cache.metas[mkKey(curYear,curMonth)]=valores;closeSheet('sheetMeta');await renderDashboard();
}
function buildCatsGrid(){document.getElementById('cats-grid').innerHTML=userConfig.areas.map((ar,i)=>'<div class="cat-field"><span class="cat-field-lbl"><span class="cdot" style="background:'+ar.color+'"></span>'+ar.name+'</span><input class="cat-inp" type="number" min="0" step="0.01" id="catinp_'+i+'" placeholder="0" inputmode="decimal"></div>').join('');}
function buildDespCatSel(){document.getElementById('desp-cat-sel').innerHTML=userConfig.desp_cats.map(c=>'<option value="'+c+'">'+c+'</option>').join('')+'<option value="__new__">+ Nova categoria...</option>';document.getElementById('new-cat-row').style.display='none';}
function handleCatSel(){document.getElementById('new-cat-row').style.display=document.getElementById('desp-cat-sel').value==='__new__'?'':'none';}
async function saveRec(){
  const date=document.getElementById('rec-date').value;if(!date){alert('Informe a data.');return;}
  const vals={};let hasVal=false;
  userConfig.areas.forEach((ar,i)=>{const v=parseFloat(document.getElementById('catinp_'+i).value)||0;vals[ar.id]=v;if(v>0)hasVal=true;});
  if(!hasVal){alert('Informe pelo menos um valor.');return;}
  const note=document.getElementById('rec-note').value.trim();showSaving();
  const{data}=await sb.from('receitas').insert({user_id:currentUser.id,data:date,vals,note}).select().single();
  if(data){const k=mkKey(curYear,curMonth);if(cache.recs[k]){cache.recs[k].unshift(data);cache.recs[k].sort((a,b)=>b.data.localeCompare(a.data));}}

async function renderDashboard(){
  const[recs,desps,metas]=await Promise.all([loadRecs(curYear,curMonth),loadDesps(curYear,curMonth),loadMetas(curYear,curMonth)]);

  else document.getElementById('alertBanner').classList.remove('show');

  let annualRec=0,annualDesp=0;
  for(let mi=0;mi<12;mi++){const r=await loadRecs(curYear,mi);const d=await loadDesps(curYear,mi);annualRec+=getRecTotal(r);annualDesp+=getDespTotal(d);}
  const annualSaldo=annualRec-annualDesp;
  const byDay={};recs.forEach(r=>{const t=userConfig.areas.reduce((s,ar)=>s+((r.vals||{})[ar.id]||0),0);byDay[r.data]=(byDay[r.data]||0)+t;});
  const bestDay=Object.entries(byDay).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('metricsTop').innerHTML='<div class="metric '+(saldo>=0?'green-card':'red-card')+'"><div class="mlabel">Saldo</div><div class="mval '+(saldo>=0?'green':'red')+'">'+fmtK(saldo)+'</div><div class="msub '+(saldo>=0?'green':'red')+'">'+(saldo>=0?'no azul':'no vermelho')+'</div></div><div class="metric"><div class="mlabel">Meta mensal</div><div class="mval sm" style="color:'+clrMeta+'">'+pctMeta.toFixed(0)+'%</div><div class="msub">falta '+fmtK(Math.max(0,metaTotal-recTotal))+'</div><div class="mbar"><div class="mfill" style="width:'+pctMeta+'%;background:'+fillMeta+'"></div></div></div>';
  document.getElementById('metricsMid').innerHTML='<div class="metric"><div class="mlabel">Receita</div><div class="mval sm">'+fmtK(recTotal)+'</div><div class="msub">'+recs.length+' lancamentos</div>'+cmp(recTotal,prevRec)+'</div><div class="metric"><div class="mlabel">Despesas</div><div class="mval sm red">'+fmtK(despTotal)+'</div><div class="msub">'+desps.length+' lancamentos</div>'+cmp(despTotal,prevDesp)+'</div><div class="metric"><div class="mlabel">Saldo ano</div><div class="mval sm '+(annualSaldo>=0?'green':'red')+'">'+fmtK(annualSaldo)+'</div><div class="msub">receita: '+fmtK(annualRec)+'</div></div><div class="metric"><div class="mlabel">Melhor dia</div><div class="mval sm">'+(bestDay?fmtK(bestDay[1]):'--')+'</div><div class="msub">'+(bestDay?fmtDate(bestDay[0]):'sem dados')+'</div></div>';
  if(metaAnual>0){const pctA=Math.min((annualRec/metaAnual)*100,100);const clrA=pctA>=100?'#18794E':pctA>=70?'#92400E':'#C0392B';document.getElementById('metaAcumCard').innerHTML='<div class="meta-acum-card"><div class="mac-top"><div><div class="mac-label2">Meta anual acumulada</div><div class="mac-val2" style="color:'+clrA+'">'+fmtK(annualRec)+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px;">de '+fmtBRL(metaAnual)+' - falta '+fmtK(Math.max(0,metaAnual-annualRec))+'</div></div><div><div class="mac-pct2" style="color:'+clrA+'">'+pctA.toFixed(0)+'%</div></div></div><div class="mbar"><div class="mfill" style="width:'+pctA+'%;background:'+clrA+'"></div></div></div>';}
  else document.getElementById('metaAcumCard').innerHTML='';
  const strip=document.getElementById('catPctStrip');
  if(recTotal>0){strip.style.display='block';document.getElementById('catPctBar').innerHTML=userConfig.areas.map(ar=>'<div class="cat-pct-seg" style="width:'+(getAreaTotal(recs,ar.id)/recTotal*100).toFixed(1)+'%;background:'+ar.color+';"></div>').join('');document.getElementById('catPctLegend').innerHTML=userConfig.areas.map(ar=>{const p=(getAreaTotal(recs,ar.id)/recTotal*100).toFixed(0);return p>0?'<div class="cat-pct-item"><span class="cat-pct-dot" style="background:'+ar.color+'"></span>'+ar.name+' '+p+'%</div>':''}).join('');}
  else strip.style.display='none';
  document.getElementById('metasAreaGrid').innerHTML=userConfig.areas.map(ar=>{const real=getAreaTotal(recs,ar.id);const meta=metas[ar.id]||0;const pct=meta>0?Math.min((real/meta)*100,100):0;const clr=pct>=100?'#18794E':pct>=70?'#92400E':'#C0392B';const fill=pct>=100?'#18794E':pct>=70?'#D97706':'#C0392B';return '<div class="meta-area-card"><div class="mac-label"><span class="cdot" style="background:'+ar.color+'"></span>'+ar.name+'</div><div class="mac-val">'+fmtK(real)+'</div><div class="mac-pct" style="color:'+clr+'">'+(meta>0?pct.toFixed(0)+'%':'--')+'</div><div class="mac-bar"><div class="mac-fill" style="width:'+pct+'%;background:'+fill+'"></div></div><div class="mac-meta">'+(meta>0?'Meta: '+fmtBRL(meta):'')+'</div></div>';}).join('');
  const rl=document.getElementById('rec-list');
  if(!recs.length)rl.innerHTML='<div class="empty-state">Nenhuma receita lancada</div>';
  else rl.innerHTML=recs.map(r=>{const total=userConfig.areas.reduce((s,ar)=>s+((r.vals||{})[ar.id]||0),0);const pills=userConfig.areas.filter(ar=>(r.vals||{})[ar.id]>0).map(ar=>'<span class="cat-pill" style="border-left:2px solid '+ar.color+';padding-left:5px;">'+ar.name+'</span>').join('');return '<div class="entry"><div class="entry-left"><span class="entry-date">'+fmtDate(r.data)+'</span></div><div class="entry-info"><div class="entry-cats">'+pills+'</div>'+(r.note?'<div class="entry-note">'+r.note+'</div>':'')+'</div><div class="entry-right"><span class="entry-val">'+fmtBRL(total)+'</span><button class="del-btn" onclick="deleteRec('+r.id+')">x</button></div></div>';}).join('');
  const dl=document.getElementById('desp-list');
  if(!desps.length)dl.innerHTML='<div class="empty-state">Nenhuma despesa lancada</div>';
  else dl.innerHTML=desps.map(d=>'<div class="entry"><div class="entry-left"><span class="entry-date">'+fmtDate(d.data)+'</span>'+(d.is_fixed?'<span class="entry-fixed-badge">FIXA</span>':'')+'</div><div class="entry-info"><span class="entry-cat-name">'+d.categoria+'</span>'+(d.note?'<div class="entry-note">'+d.note+'</div>':'')+'</div><div class="entry-right"><span class="entry-val neg">-'+fmtBRL(d.val)+'</span><button class="del-btn" onclick="deleteDesp('+d.id+')">x</button></div></div>').join('');
  const catMap={};desps.forEach(d=>{catMap[d.categoria]=(catMap[d.categoria]||0)+(d.val||0);});
  const sorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);const maxD=sorted.length?sorted[0][1]:1;
  const bd=document.getElementById('despBreakdown');
  if(!sorted.length)bd.innerHTML='<div class="empty-state">Sem despesas</div>';
  else bd.innerHTML=sorted.map(([cat,val])=>'<div class="breakdown-row"><span class="bk-label">'+cat+'</span><div class="bk-bar-wrap"><div class="bk-bar-fill" style="width:'+(val/maxD*100).toFixed(0)+'%;background:#C0392B44;"></div></div><span class="bk-val">-'+fmtBRL(val)+'</span></div>').join('');
  const totalDays=daysInMonth(curYear,curMonth);const today=new Date();const isNow=curYear===today.getFullYear()&&curMonth===today.getMonth();const todayDay=today.getDate();
  const launched=new Set(recs.map(r=>parseInt(r.data.split('-')[2])));
  let streak=0;for(let i=1;i<=90;i++){const d=new Date(today);d.setDate(d.getDate()-i);const y=d.getFullYear(),mi=d.getMonth();const ds=y+'-'+String(mi+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const r=await loadRecs(y,mi);if(r.some(rec=>rec.data===ds))streak++;else break;}
  document.getElementById('streakBadge').innerHTML=streak>0?'<div class="streak-badge">'+streak+' dia'+(streak===1?'':'s')+' seguidos</div>':'';
  document.getElementById('daysGrid').innerHTML=Array.from({length:totalDays},(_,i)=>{const day=i+1;const isFuture=isNow&&day>todayDay;const isToday=isNow&&day===todayDay;const has=launched.has(day);let cls='day-dot';if(has)cls+=' has';else if(isToday)cls+=' today';else if(isFuture)cls+=' future';return '<div class="'+cls+'">'+day+'</div>';}).join('');
  const dLaunched=launched.size,dTotal=isNow?todayDay:totalDays,dMissing=dTotal-dLaunched,avgD=dLaunched>0?recTotal/dLaunched:0;
  const dtotals={};const dcounts={};recs.forEach(r=>{const d=new Date(r.data+'T12:00:00');const dow=d.getDay();const t=userConfig.areas.reduce((s,ar)=>s+((r.vals||{})[ar.id]||0),0);dtotals[dow]=(dtotals[dow]||0)+t;dcounts[dow]=(dcounts[dow]||0)+1;});
  let bestDow=-1,bestAvg=0;Object.entries(dtotals).forEach(([dow,total])=>{const avg=total/dcounts[dow];if(avg>bestAvg){bestAvg=avg;bestDow=parseInt(dow);}});
  const rows=[];
  if(avgD>0)rows.push({label:'Media por dia lancado',val:fmtBRL(avgD)});

}
async function renderComparativo(){

}
